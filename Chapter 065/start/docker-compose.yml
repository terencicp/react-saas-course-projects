services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    # Postgres 18 stores its data under /var/lib/postgresql/18/docker, so the
    # volume must mount the PARENT path. Mounting /var/lib/postgresql/data
    # silently fails to persist on v18.
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
