services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    # Postgres 18 stores its data under /var/lib/postgresql/18/docker, so the
    # volume must mount the PARENT path. Mounting /var/lib/postgresql/data
    # silently fails to persist on v18.
    volumes:
      - pgdata:/var/lib/postgresql

  # The test-only Postgres. Both `saas_int_test` (integration) and `saas_e2e` live in
  # this one service; the db:test:setup / db:e2e:reset scripts CREATE each database
  # against it. Host port 55432 keeps it off the dev DB's 5432. The fsync/commit tuning
  # trades durability for speed — only ever on a DB that holds throwaway test data.
  postgres-test:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: saas_int_test
    ports:
      - '55432:5432'
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
    volumes:
      - pgdata_test:/var/lib/postgresql

volumes:
  pgdata:
  pgdata_test:
